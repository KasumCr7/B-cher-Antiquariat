services:

  app:
    build: .
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: books
      DB_USER: rundb
      DB_PASS: runpass
      BASE_URL: ""
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/var/www/html
      - /var/www/html/.git

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: books
      MYSQL_USER: rundb
      MYSQL_PASSWORD: runpass
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - db_data:/var/lib/mysql
      - ./books.sql:/docker-entrypoint-initdb.d/books.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-urundb", "-prunpass"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data:
